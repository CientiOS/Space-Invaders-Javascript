<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CANVAS | Space Invaders</title>
    <style>
      body {
        width: 960px;
        margin: 0 auto;
        text-align: center;
      }
      canvas {
        background: rgb(0, 0, 0);
        border: solid rgb(0, 0, 0) 3px;
      }
    </style>
    <script>
      let game = {
        canvas: null,
        ctx: null,
        imagen: null,
        caratula: true,
        imagenEnemigo: null,
        teclaPulsada: null,
        tecla: [],
        colorBala: "green",
        colorBala2: "red",
        balas_array: [],
        balasEnemigas_array: [],
        enemigos_array: [],
        disparo: false,
        puntos: 0,
        finJuego: false,
        shot: null,
        explosion: null,
        invaderkilled: null,
      };

      const KEY_ENTER = 13;
      const KEY_LEFT = 65;
      const KEY_RIGHT = 68;
      const KEY_SPACE = 32;

      function reproducirSonido(sonido) {
        sonido.currentTime = 0;
        sonido.play();
      }

      function Bala(x, y, w) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.dibujar = function () {
          this.y -= 10;
          game.ctx.save();
          game.ctx.fillStyle = game.colorBala;
          game.ctx.fillRect(this.x, this.y, this.w, 10);
          game.ctx.restore();
        };
        this.disparar = function () {
          game.ctx.save();
          game.ctx.fillStyle = game.colorBala2;
          game.ctx.fillRect(this.x, this.y, this.w, this.w);
          this.y = this.y + 6;
          game.ctx.restore();
        };
      }

      function Jugador(x) {
        this.x = x;
        this.y = 450;
        this.w = 30;
        this.h = 15;
        this.dibujar = function (x) {
          this.x = x;
          game.ctx.drawImage(game.imagen, this.x, this.y, this.w, this.h);
        };
      }

      function Enemigo(x, y) {
        this.x = x;
        this.y = y;
        this.w = 35;
        this.veces = 0;
        this.dx = 5;
        this.ciclos = 0;
        this.num = 14;
        this.figura = true;
        this.vive = true;

        this.dibujar = function () {
          if (this.ciclos > 30) {
            if (this.veces > this.num) {
              this.dx *= -1;
              this.veces = 0;
              this.num = 28;
              this.y += 20;
              this.dx = this.dx > 0 ? this.dx + 1 : this.dx - 1;
            } else {
              this.x += this.dx;
            }
            this.veces++;
            this.ciclos = 0;
            this.figura = !this.figura;
          } else {
            this.ciclos++;
          }

          if (this.figura) {
            game.ctx.drawImage(
              game.imagenEnemigo,
              0,
              0,
              40,
              30,
              this.x,
              this.y,
              35,
              30,
            );
          } else {
            game.ctx.drawImage(
              game.imagenEnemigo,
              50,
              0,
              40,
              30,
              this.x,
              this.y,
              35,
              30,
            );
          }
        };
      }

      const caratula = () => {
        let imagen = new Image();
        imagen.src = "imagenes/portada.png";
        imagen.onload = () => {
          game.ctx.drawImage(imagen, 0, 0);
        };
      };

      const seleccionar = () => {
        if (game.caratula) {
          inicio();
        }
      };

      const inicio = () => {
        game.ctx.clearRect(0, 0, game.canvas.width, game.canvas.height);
        game.caratula = false;
        game.jugador = new Jugador(0);
        game.x = game.canvas.width / 2;
        game.jugador.dibujar(game.x);
        animar();
      };

      const mensaje = (cadena, y, tamano = 40, color = "green") => {
        let medio = game.canvas.width / 2;
        game.ctx.save();
        game.ctx.fillStyle = color;
        game.ctx.strokeStyle = "blue";
        game.ctx.textAlign = "center";
        game.ctx.textBaseline = "middle";
        game.ctx.font = "bold " + tamano + "px Courier";
        game.ctx.fillText(cadena, medio, y);
        game.ctx.strokeText(cadena, medio, y);
        game.ctx.restore();
      };

      const gameover = () => {
        game.ctx.clearRect(0, 0, game.canvas.width, game.canvas.height);
        game.finJuego = true;
        mensaje("GAME OVER", 100, 60, "red");
        mensaje("Puntos: " + game.puntos, 200, 40, "white");
        mensaje("Pulsa ENTER para reiniciar", 300, 20, "yellow");

        if (game.puntos > 100 && game.puntos <= 200) {
          mensaje("Casi lo logras", 340);
        } else if (game.puntos > 200) {
          mensaje("Eres un Crack", 340);
        } else {
          mensaje("Finished", 340);
        }
      };

      const victoria = () => {
        game.ctx.clearRect(0, 0, game.canvas.width, game.canvas.height);
        game.finJuego = true;
        mensaje("¡VICTORIA!", 100, 60, "lime");
        mensaje("Puntos: " + game.puntos, 200, 40, "white");
        mensaje("Pulsa ENTER para reiniciar", 300, 20, "yellow");
      };

      const reiniciar = () => {
        game.puntos = 0;
        game.balas_array = [];
        game.balasEnemigas_array = [];
        game.enemigos_array = [];
        game.disparo = false;
        game.finJuego = false;
        game.caratula = false;

        game.jugador = new Jugador(0);
        game.x = game.canvas.width / 2;

        for (let i = 0; i < 5; i++) {
          for (let j = 0; j < 10; j++) {
            game.enemigos_array.push(new Enemigo(100 + 40 * j, 30 + 45 * i));
          }
        }

        animar();
      };

      const animar = () => {
        if (!game.finJuego) {
          const colisiones = () => {
            let enemigo, bala;

            for (var i = 0; i < game.enemigos_array.length; i++) {
              for (var j = 0; j < game.balas_array.length; j++) {
                enemigo = game.enemigos_array[i];
                bala = game.balas_array[j];

                if (enemigo != null && bala != null) {
                  if (
                    bala.x > enemigo.x &&
                    bala.x < enemigo.x + enemigo.w &&
                    bala.y > enemigo.y &&
                    bala.y < enemigo.y + enemigo.w
                  ) {
                    enemigo.vive = false;
                    game.enemigos_array[i] = null;
                    game.balas_array[j] = null;
                    game.disparo = false;
                    game.puntos += 10;
                    reproducirSonido(game.invaderkilled);
                  }
                }
              }
            }

            if (game.enemigos_array.filter((e) => e !== null).length === 0) {
              victoria();
            }

            for (var j = 0; j < game.balasEnemigas_array.length; j++) {
              bala = game.balasEnemigas_array[j];
              if (bala != null) {
                if (
                  bala.x > game.jugador.x &&
                  bala.x < game.jugador.x + game.jugador.w &&
                  bala.y > game.jugador.y &&
                  bala.y < game.jugador.y + game.jugador.h
                ) {
                  reproducirSonido(game.explosion);
                  gameover();
                }
              }
            }
          };

          const verificar = () => {
            if (game.tecla[KEY_RIGHT]) game.x += 15;
            if (game.tecla[KEY_LEFT]) game.x -= 15;

            if (game.x > game.canvas.width - 30)
              game.x = game.canvas.width - 30;
            if (game.x < 0) game.x = 0;

            if (game.tecla[KEY_SPACE]) {
              if (!game.disparo) {
                game.balas_array.push(
                  new Bala(game.x + 12, game.jugador.y - 3, 5),
                );
                game.tecla[KEY_SPACE] = false;
                game.disparo = true;
                reproducirSonido(game.shot);
              }
            }

            if (Math.random() > 0.96) {
              dispararEnemigo();
            }
          };

          const dispararEnemigo = () => {
            var ultimos = [];
            for (var i = game.enemigos_array.length - 1; i >= 0; i--) {
              if (game.enemigos_array[i] != null) {
                ultimos.push(i);
              }
              if (ultimos.length == 10) break;
            }
            d = ultimos[Math.floor(Math.random() * ultimos.length)];
            if (d !== undefined) {
              game.balasEnemigas_array.push(
                new Bala(
                  game.enemigos_array[d].x + game.enemigos_array[d].w / 2,
                  game.enemigos_array[d].y,
                  5,
                ),
              );
            }
          };

          const pintar = () => {
            game.ctx.clearRect(0, 0, game.canvas.width, game.canvas.height);
            game.jugador.dibujar(game.x);

            score();

            for (var i = 0; i < game.enemigos_array.length; i++) {
              if (game.enemigos_array[i] != null) {
                game.enemigos_array[i].dibujar();
              }
            }

            for (var i = 0; i < game.balas_array.length; i++) {
              if (game.balas_array[i] != null) {
                game.balas_array[i].dibujar();
                if (game.balas_array[i].y < 0) {
                  game.disparo = false;
                  game.balas_array[i] = null;
                }
              }
            }

            for (var i = 0; i < game.balasEnemigas_array.length; i++) {
              if (game.balasEnemigas_array[i] != null) {
                game.balasEnemigas_array[i].disparar();
                if (game.balasEnemigas_array[i].y > game.canvas.height) {
                  game.balasEnemigas_array[i] = null;
                }
              }
            }

            colisiones();
          };

          const score = () => {
            game.ctx.save();
            game.ctx.fillStyle = "white";
            game.ctx.font = "bold 20px Courier";
            game.ctx.fillText("Score: " + game.puntos, 10, 20);
            game.ctx.restore();
          };

          document.addEventListener("keydown", function (e) {
            game.teclaPulsada = e.keyCode;
            game.tecla[e.keyCode] = true;
          });

          document.addEventListener("keyup", function (e) {
            game.tecla[e.keyCode] = false;
          });

          const loop = () => {
            if (!game.finJuego) {
              requestAnimationFrame(loop);
              verificar();
              pintar();
            }
          };

          loop();
        }
      };

      window.onload = function () {
        game.canvas = document.getElementById("canvas");
        if (game.canvas && game.canvas.getContext) {
          game.ctx = canvas.getContext("2d");

          if (game.ctx) {
            game.shot = document.getElementById("shot");
            game.explosion = document.getElementById("explosion");
            game.invaderkilled = document.getElementById("invaderkilled");

            game.canvas.setAttribute("tabindex", 0);
            game.canvas.focus();

            game.imagen = new Image();
            game.imagen.src = "imagenes/cannon.png";

            game.imagenEnemigo = new Image();
            game.imagenEnemigo.src = "imagenes/invader.fw.png";

            game.imagenEnemigo.onload = function () {
              for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 10; j++) {
                  game.enemigos_array.push(
                    new Enemigo(100 + 40 * j, 30 + 45 * i),
                  );
                }
              }
            };

            caratula();

            game.canvas.addEventListener("click", seleccionar, false);
            game.canvas.addEventListener("keydown", function (e) {
              game.teclaPulsada = e.keyCode;
              if (game.teclaPulsada === KEY_ENTER) {
                if (game.caratula) {
                  inicio();
                } else if (game.finJuego) {
                  reiniciar();
                }
              }
            });
          } else {
            alert("NO cuentas con CANVAS");
          }
        }
      };
    </script>
  </head>

  <body>
    <h1>Space Invaders</h1>
    <canvas id="canvas" width="960" height="500">
      Tu navegador no soporta el canvas de HTML5
    </canvas>

    <audio id="shot" preload="auto">
      <source src="sonidos/shot.mp3" type="audio/mpeg" />
    </audio>
    <audio id="explosion" preload="auto">
      <source src="sonidos/explosion.wav" type="audio/wav" />
    </audio>
    <audio id="invaderkilled" preload="auto">
      <source src="sonidos/invaderkilled.wav" type="audio/wav" />
     
      </audio>
    </audio>
  </body>
</html>
